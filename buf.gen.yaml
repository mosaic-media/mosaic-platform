# Codegen for the session transport contract (ADR 0041). With source_relative
# paths and out=internal/gen, the proto at proto/mosaic/session/v1/session.proto
# generates to internal/gen/mosaic/session/v1/, matching the go_package import
# path in the .proto. No protoc: buf drives protoc-gen-go and
# protoc-gen-connect-go directly.
version: v2
plugins:
  - local: protoc-gen-go
    out: internal/gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: internal/gen
    opt: paths=source_relative
