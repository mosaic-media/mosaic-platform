name: verify

# Server-side enforcement on every push and pull request. The headline gate is
# the SPDX license header check (tools/licenseheader): a file without the header
# fails here, so the header cannot drift regardless of a contributor's editor
# setup. gofmt/vet/build ride along so a green check means the tree is also
# formatted and compiles — not just that headers are present.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: License headers (tools/licenseheader -check)
        run: go run ./tools/licenseheader -check

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...
